name: Publish Python SDK

# Publish the typed Python SDK (calibrate-python-sdk) to PyPI, generated by Fern
# from the exported PUBLIC OpenAPI spec. Triggered by pushing an `sdk-v*` tag —
# a DEDICATED tag line, deliberately separate from the backend's own `v*` release
# tags (those drive deploy.yml on `release: published`), so an SDK publish never
# rides along with a backend deploy. The SDK version is the tag minus the
# `sdk-v` prefix (sdk-v0.1.0 -> 0.1.0). PyPI versions are immutable, so releasing
# the SDK = pushing a new `sdk-v*` tag. `workflow_dispatch` backfills by hand.
on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to publish (e.g. 0.1.0). Required for manual runs."
        required: true

# Never let two publishes for the same version race.
concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # calibrate-agent -> pipecat pulls in an audio dep that needs ALSA headers
      # to `uv sync`; mirrors tests.yml. Needed so `import main` succeeds.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # openapi.json is gitignored, not committed — this step generates it fresh
      # from the live app so the publish always reflects current code.
      - name: Export fresh public OpenAPI spec
        run: uv run python scripts/export_openapi.py

      - name: Resolve SDK version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#sdk-v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::No version resolved (not a tag push and no manual input)." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing calibrate-python-sdk version $VERSION"

      - name: Install Fern
        run: npm install -g fern-api

      - name: Generate + publish SDK
        run: fern generate --group python-sdk --version "${{ steps.version.outputs.version }}" --log-level debug
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
