name: Publish Python SDK

# Build and publish the typed Python SDK (calibrate-python-sdk) to PyPI, generated
# by Fern from the app's PUBLIC OpenAPI spec (fetched by the ./.github/actions/
# fetch-public-spec composite action). Triggered by pushing an `sdk-v*` tag — a
# DEDICATED tag line, deliberately separate from the backend's own `v*` release
# tags (those drive deploy.yml on `release: published`), so an SDK publish never
# rides along with a backend deploy. SDK version = tag minus the `sdk-v` prefix
# (sdk-v0.1.0 -> 0.1.0). PyPI versions are immutable, so releasing = a NEW tag.
# `workflow_dispatch` backfills by hand.
#
# OWN-THE-BUILD: Fern generates the SDK LOCALLY (`--local`, in Docker) and WE
# build + upload the artifact with twine — one workflow, one tag. We deliberately
# do NOT use Fern's remote/github publish: without a GitHub repo configured Fern
# writes an empty `Project-URL: Repository,` that PyPI rejects with
# "400 Must have a URL", and github-mode also splits publishing into a second
# repo's CI. So this workflow patches the two things Fern's --local output leaves
# unset (the project URL and the one-line summary), swaps in our hand-written
# README (fern/sdk-README.md) as the long_description, then builds and uploads.
on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to publish (e.g. 0.1.0). Required for manual runs."
        required: true

# Never let two publishes for the same version race.
concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install deps, boot the app, and fetch its public spec into fern/openapi/.
      # Shared with validate-sdk.yml (one source of truth for the boot/env/fetch).
      # Also installs `uv`, which the build/publish steps below rely on.
      - uses: ./.github/actions/fetch-public-spec

      - name: Resolve SDK version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#sdk-v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::No version resolved (not a tag push and no manual input)." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building calibrate-python-sdk version $VERSION"

      - name: Install Fern
        run: npm install -g fern-api

      - name: Generate SDK locally
        id: gen
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          # `--local` generates in Docker and never publishes, but the pypi output
          # config references ${PYPI_TOKEN}; a placeholder keeps `fern` happy.
          PYPI_TOKEN: unused-for-local-generation
        run: |
          fern generate --group python-sdk --local --version "${{ steps.version.outputs.version }}" 2>&1 | tee gen.log
          OUT=$(grep -oE "Wrote files to [^ ]+" gen.log | awk '{print $NF}' | tail -1)
          test -n "$OUT" && test -d "$OUT" || { echo "::error::Fern did not report a valid output dir"; exit 1; }
          echo "outdir=$OUT" >> "$GITHUB_OUTPUT"

      - name: Finalize package metadata + README
        run: |
          OUT="${{ steps.gen.outputs.outdir }}"
          # Fern leaves the Project-URL empty without a github repo, and PyPI
          # rejects an empty URL ("400 Must have a URL"). Give it a real one.
          sed -i "s|^Repository = ''|Homepage = 'https://pense-backend.artpark.ai'|" "$OUT/pyproject.toml"
          # Fill the one-line summary (Fern's --local leaves it blank).
          sed -i 's|^description = ""|description = "Python SDK for the Calibrate API."|' "$OUT/pyproject.toml"
          # Use our hand-written minimal README as the PyPI long_description
          # (instead of Fern's auto-generated one).
          cp fern/sdk-README.md "$OUT/README.md"
          echo "Patched pyproject.toml:"
          grep -E "^description|^\[tool.poetry.urls\]|Homepage|Repository" "$OUT/pyproject.toml" || true

      - name: Build + publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          OUT="${{ steps.gen.outputs.outdir }}"
          cd "$OUT"
          uv build
          uvx twine upload --non-interactive dist/*
