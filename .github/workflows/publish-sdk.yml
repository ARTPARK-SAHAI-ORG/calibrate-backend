name: Publish SDK and CLI

# Packages the public OpenAPI spec through Fern to publish:
#   - calibrate-sdk (Python SDK)
#   - Calibrate CLI (uses that SDK)
# Both are synced to their own GitHub repos; this workflow then auto-tags each
# repo so its CI publishes the package (PyPI for SDK, release artifacts for CLI).
#
# Trigger:
#   - Push an sdk-v* tag (e.g. sdk-v0.0.1 → version 0.0.1 on PyPI), or
#   - Run manually from the Actions UI and enter the version directly (e.g. 0.0.1).
on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.1). Used as-is for PyPI — no sdk-v prefix."
        required: true

# Never let two publishes for the same version race.
concurrency:
  group: publish-clients-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  clients:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      # Install deps, boot the app, and fetch its public spec into fern/openapi/.
      # Shared with validate-sdk.yml (one source of truth for the boot/env/fetch).
      - uses: ./.github/actions/fetch-public-spec
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}

      - name: Resolve generated client version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#sdk-v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::No version resolved (not a tag push and no manual input)." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing calibrate-sdk and Calibrate CLI version $VERSION"

      - name: Install Fern
        run: npm install -g fern-api

      # github-mode: this PUSHES the generated SDK to dalmia/calibrate-python-sdk
      # (and sets that repo up to publish). It does NOT publish to PyPI itself.
      - name: Generate SDK + sync to repo
        run: fern generate --group python-sdk --version "${{ steps.version.outputs.version }}" --log-level debug
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

      # github-mode: this PUSHES the generated CLI to dalmia/calibrate-cli
      # (Fern also scaffolds that repo's release CI). It does NOT publish
      # binaries itself — see the tag step below.
      - name: Generate Calibrate CLI + sync to repo
        run: fern generate --group cli --version "${{ steps.version.outputs.version }}" --log-level debug
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}

      # The SDK repo's own ci.yml publishes to PyPI, but only when a tag is pushed
      # THERE. So tag it automatically right after the sync — a single `sdk-v*` tag
      # on THIS repo then drives the whole release (generate -> push -> tag -> publish).
      # Needs SDK_REPO_TOKEN: a PAT with contents:write on dalmia/calibrate-python-sdk
      # and dalmia/calibrate-cli.
      # (The default GITHUB_TOKEN can't push to another repo, and — unlike a
      # GITHUB_TOKEN push — a PAT-created tag DOES trigger the SDK repo's workflow.)
      # The published version comes from the SDK repo's pyproject (set by --version
      # above); this tag name only triggers the run.
      - name: Tag SDK repo to trigger its PyPI publish
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          SDK_REPO="dalmia/calibrate-python-sdk"
          TAG="v${{ steps.version.outputs.version }}"
          SHA=$(gh api "repos/$SDK_REPO/git/ref/heads/main" --jq .object.sha)
          gh api "repos/$SDK_REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
          echo "Tagged $SDK_REPO @ $SHA as $TAG — its ci.yml will publish to PyPI."

      # Same pattern for the CLI repo — one sdk-v* tag drives SDK + CLI releases.
      # Needs SDK_REPO_TOKEN with contents:write on dalmia/calibrate-cli too
      # (the same PAT as the SDK repo works if scoped to both).
      - name: Tag CLI repo to trigger its release publish
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          CLI_REPO="dalmia/calibrate-cli"
          TAG="v${{ steps.version.outputs.version }}"
          SHA=$(gh api "repos/$CLI_REPO/git/ref/heads/main" --jq .object.sha)
          gh api "repos/$CLI_REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
          echo "Tagged $CLI_REPO @ $SHA as $TAG — its ci.yml will publish the CLI."
