name: Publish Python SDK

# Publish the typed Python SDK (calibrate-python-sdk) to PyPI, generated by Fern
# from the app's PUBLIC OpenAPI spec (fetched by booting the app and curling
# /public-api/openapi.json). Triggered by pushing an `sdk-v*` tag —
# a DEDICATED tag line, deliberately separate from the backend's own `v*` release
# tags (those drive deploy.yml on `release: published`), so an SDK publish never
# rides along with a backend deploy. The SDK version is the tag minus the
# `sdk-v` prefix (sdk-v0.1.0 -> 0.1.0). PyPI versions are immutable, so releasing
# the SDK = pushing a new `sdk-v*` tag. `workflow_dispatch` backfills by hand.
on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to publish (e.g. 0.1.0). Required for manual runs."
        required: true

# Never let two publishes for the same version race.
concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # calibrate-agent -> pipecat pulls in an audio dep that needs ALSA headers
      # to `uv sync`; mirrors tests.yml. Needed so `import main` succeeds.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # Fetch the public spec from THIS commit's code: boot the app with
      # throwaway env, wait until it serves, then curl it to the gitignored file
      # Fern reads (fern/openapi/openapi.json). The server is only needed for the
      # curl — Fern generates from the local file, so we don't keep it running.
      - name: Fetch public OpenAPI spec from the app
        env:
          DB_ROOT_DIR: /tmp/sdk-openapi
          JWT_SECRET_KEY: sdk-export-dummy-secret-key-32-chars-min
          S3_OUTPUT_BUCKET: sdk-export-dummy-bucket
          MAX_CONCURRENT_JOBS: "1"
          MAX_CONCURRENT_JOBS_PER_ORG: "1"
          DEFAULT_MAX_ROWS_PER_EVAL: "20"
          SUPERADMIN_EMAIL: admin@example.com
        run: |
          (cd src && uv run uvicorn main:app --port 8000 --log-level warning &)
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/public-api/openapi.json -o /dev/null && break
            sleep 2
          done
          mkdir -p fern/openapi
          curl -sf http://localhost:8000/public-api/openapi.json -o fern/openapi/openapi.json
          test -s fern/openapi/openapi.json || { echo "::error::Failed to fetch public OpenAPI spec"; exit 1; }

      - name: Resolve SDK version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#sdk-v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::No version resolved (not a tag push and no manual input)." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing calibrate-python-sdk version $VERSION"

      - name: Install Fern
        run: npm install -g fern-api

      - name: Generate + publish SDK
        run: fern generate --group python-sdk --version "${{ steps.version.outputs.version }}" --log-level debug
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
