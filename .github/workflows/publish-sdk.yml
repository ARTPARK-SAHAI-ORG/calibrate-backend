name: Publish SDK and CLI

# Publish the typed Python SDK (calibrate-sdk) and cloud CLI (calibrate),
# generated by Speakeasy from the app's PUBLIC OpenAPI spec (fetched by the
# ./.github/actions/fetch-public-spec composite action). Triggered by pushing an
# `sdk-v*` tag — a DEDICATED tag line, deliberately separate from the backend's
# own `v*` release tags (those drive deploy.yml on `release: published`), so a
# client publish never rides along with a backend deploy. The client version is
# the tag minus the `sdk-v` prefix (sdk-v0.1.0 -> 0.1.0). `workflow_dispatch`
# backfills by hand.
on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Client version to publish (e.g. 0.1.0). Required for manual runs."
        required: true

# Never let two publishes for the same version race.
concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  clients:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      # Install deps, boot the app, and fetch its public spec into openapi/.
      # Shared with validate-sdk.yml (one source of truth for the boot/env/fetch).
      - uses: ./.github/actions/fetch-public-spec
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}

      - name: Resolve client version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#sdk-v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::No version resolved (not a tag push and no manual input)." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing calibrate-sdk + calibrate CLI version $VERSION"

      - name: Install Speakeasy CLI
        run: curl -fsSL https://go.speakeasy.com/cli-install.sh | sh

      # Generate locally, then rsync into the client repos. Speakeasy writes to
      # .speakeasy/out/*; we push to dalmia/* with SDK_REPO_TOKEN (PAT with
      # contents:write on both repos). PyPI / GitHub Releases are triggered by
      # tagging those repos after the sync (same pattern as the old Fern flow).
      - name: Generate Python SDK + sync to repo
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          speakeasy run -t calibrate-python-sdk \
            --set-version "${{ steps.version.outputs.version }}" \
            --skip-testing -y
          ./.github/scripts/sync-client-repo.sh \
            dalmia/calibrate-python-sdk \
            .speakeasy/out/python \
            "chore(sdk): release ${{ steps.version.outputs.version }}"

      - name: Generate CLI + sync to repo
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          speakeasy run -t calibrate-cli \
            --set-version "${{ steps.version.outputs.version }}" \
            --skip-testing -y
          ./.github/scripts/sync-client-repo.sh \
            dalmia/calibrate-cli \
            .speakeasy/out/cli \
            "chore(cli): release ${{ steps.version.outputs.version }}"

      - name: Tag SDK repo to trigger its PyPI publish
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          SDK_REPO="dalmia/calibrate-python-sdk"
          TAG="v${{ steps.version.outputs.version }}"
          SHA=$(gh api "repos/$SDK_REPO/git/ref/heads/main" --jq .object.sha)
          gh api "repos/$SDK_REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
          echo "Tagged $SDK_REPO @ $SHA as $TAG — its ci.yml will publish to PyPI."

      - name: Tag CLI repo to trigger its release workflow
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          CLI_REPO="dalmia/calibrate-cli"
          TAG="v${{ steps.version.outputs.version }}"
          SHA=$(gh api "repos/$CLI_REPO/git/ref/heads/main" --jq .object.sha)
          gh api "repos/$CLI_REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
          echo "Tagged $CLI_REPO @ $SHA as $TAG — its release workflow will build binaries."
