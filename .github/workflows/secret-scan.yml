name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pinned binary rather than gitleaks-action, which needs a paid license
      # for organizations. Scans the checked-out tree (tracked files only, so
      # the gitignored src/.env never reaches CI).
      - name: Install gitleaks
        run: |
          version=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: gitleaks dir . --redact --no-banner
