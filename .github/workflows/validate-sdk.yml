name: Validate SDK config

# Validates Fern (Python SDK) + Speakeasy (CLI) client-generation config on PRs
# that touch those files. Fetches the public spec via fetch-public-spec (same as
# publish-sdk.yml).
on:
  pull_request:
    branches: [main]
    paths:
      - ".speakeasy/**"
      - "fern/**"
      - "openapi/overlay.yaml"
      - ".github/actions/fetch-public-spec/**"
      - ".github/workflows/validate-sdk.yml"
      - ".github/workflows/publish-sdk.yml"
      - ".github/workflows/auto-publish-sdk.yml"
      - ".github/scripts/sync-client-repo.sh"
      - ".github/scripts/normalize_openapi_hash.py"
      - ".github/scripts/next-sdk-version.sh"
      - ".github/scripts/next_sdk_version.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-clients:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/fetch-public-spec

      - name: Install Fern
        run: npm install -g fern-api

      - name: Validate Fern Python SDK config
        run: fern check

      - name: Install Speakeasy CLI
        run: curl -fsSL https://go.speakeasy.com/cli-install.sh | sh

      # --skip-upload-spec: compile overlay locally only; no registry auth needed.
      # Fork PRs do not receive repo secrets (SPEAKEASY_API_KEY), so this must stay offline.
      - name: Compile public OpenAPI source (merge spec + overlay)
        run: speakeasy run -s calibrate-public-api -y --skip-upload-spec

      - name: Lint compiled OpenAPI document
        run: speakeasy lint openapi -s openapi/compiled.yaml

      - name: Validate Speakeasy config
        run: speakeasy lint config -d .
