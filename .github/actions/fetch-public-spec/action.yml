name: Fetch public OpenAPI spec
description: >-
  Install deps, boot the backend with throwaway env, and download its PUBLIC
  OpenAPI spec (/public-api/openapi.json) into the gitignored file at
  openapi/openapi.json (shared by Fern Python SDK and Speakeasy CLI). Used by publish-sdk.yml
  and validate-sdk.yml.

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync --frozen

    - name: Fetch public OpenAPI spec from the app
      shell: bash
      env:
        PUBLIC_API_BASE_URL: ${{ env.PUBLIC_API_BASE_URL }}
      run: ./.github/scripts/fetch-public-openapi.sh
