# Fern config for calibrate-sdk and the Calibrate CLI.
# OpenAPI spec: fetched from /public-api/openapi.json before generate (see publish-sdk.yml).
# SDK method names: openapi-overrides.yml (must match public routes — tests enforce this).
api:
  specs:
    - openapi: ./openapi/openapi.json
      overrides: ./openapi-overrides.yml
groups:
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        version: 5.15.2
        output:
          location: pypi
          package-name: calibrate-sdk
          token: ${PYPI_TOKEN}
        github:
          repository: dalmia/calibrate-python-sdk
          mode: push
        metadata:
          author: "Aman Dalmia"
          email: "aman.dalmia@artpark.in"
          license: "MIT"
          package-description: "Python SDK for the Calibrate agent evaluation platform API."
        config:
          package_name: calibrate
          client_class_name: Calibrate
  cli:
    generators:
      - name: fernapi/fern-cli
        version: 0.21.1
        github:
          repository: dalmia/calibrate-cli
          mode: push
        config:
          cli-name: calibrate
          display-name: "Calibrate CLI"
