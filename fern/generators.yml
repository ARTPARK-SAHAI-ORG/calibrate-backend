# Fern config for the Calibrate cloud CLI only.
# Python SDK (calibrate-sdk) is generated by Speakeasy — see .speakeasy/workflow.yaml.
# OpenAPI spec: fetched to openapi/openapi.json before generate (see publish-sdk.yml).
# CLI method names: openapi-overrides.yml (must match public routes — tests enforce this).
api:
  specs:
    - openapi: ../openapi/openapi.json
      overrides: ./openapi-overrides.yml
groups:
  cli:
    generators:
      - name: fernapi/fern-cli
        version: 0.21.1
        github:
          repository: dalmia/calibrate-cli
          mode: push
        config:
          cli-name: calibrate
          display-name: "Calibrate CLI"
