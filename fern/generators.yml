# Fern config for calibrate-sdk (Python SDK) only.
# Calibrate CLI is generated by Speakeasy — see .speakeasy/workflow.yaml.
# OpenAPI spec: fetched to openapi/openapi.json before generate (see publish-sdk.yml).
# SDK method names: openapi-overrides.yml (must match public routes — tests enforce this).
api:
  specs:
    - openapi: ../openapi/openapi.json
      overrides: ./openapi-overrides.yml
# README customization for the generated Python SDK (calibrate-sdk on PyPI).
# `apiName` replaces the auto-derived org name in the README H1, which Fern
# always renders as "{apiName} Python Library" — so keep it short ("Calibrate")
# rather than "Calibrate Python SDK", or the heading doubles up ("... Python
# SDK Python Library").
readme:
  apiName: "Calibrate"
  introduction: |
    The Calibrate Python SDK provides convenient, typed access to the Calibrate
    agent evaluation platform API. Authenticate with an API key (`sk_…`) scoped
    to your organization to run agent tests and poll their results.
  # bannerLink: "https://<host>/path/to/banner.png"  # add once a banner asset exists
  # Host is not committed: Fern expands ${PUBLIC_API_BASE_URL} at generate time
  # (same secret used to fetch the public spec). The fern generate/check steps in
  # publish-sdk.yml and validate-sdk.yml export it.
  apiReferenceLink: "${PUBLIC_API_BASE_URL}/public-api/docs"
  disabledSections:
    - "contributing"
  customSections:
    - title: "Quick Start"
      language: "python"
      content: |
        ```python
        from calibrate import Calibrate

        client = Calibrate(api_key="sk_...")

        # List the agents in your organization
        agents = client.agents.list()

        # Kick off a test run for an agent and poll for the result
        run = client.agent_tests.run(agent_uuid="<agent-uuid>")
        result = client.agent_tests.get_run(task_id=run.task_id)
        ```
groups:
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        version: 5.15.2
        output:
          location: pypi
          package-name: calibrate-sdk
          token: ${PYPI_TOKEN}
        github:
          repository: dalmia/calibrate-python-sdk
          mode: push
        metadata:
          author: "Aman Dalmia"
          email: "aman.dalmia@artpark.in"
          license: "MIT"
          package-description: "Python SDK for the Calibrate agent evaluation platform API."
        config:
          package_name: calibrate
          client_class_name: Calibrate
